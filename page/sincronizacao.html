<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyra - Sincronizar Apps</title>
    <link rel="icon" type="image/x-icon" href="../public/LOGO-VETORIZADA.png">
    <link rel="stylesheet" href="../style/lgpd.css">
    <link rel="stylesheet" href="../style/sinc.css">
</head>

<body class="lgpd-screen">

    <main class="logo-container">
        <img src="../public/Group 9.png" alt="Logo Lyra" class="main-logo">
    </main>

    <aside class="bottom-sheet" aria-labelledby="sync-title">
        <div class="sheet-indicator"></div>
        <div class="sheet-content">
            <h2 id="sync-title">Sincronize com seus Apps</h2>
            <p>Conecte seus apps de saúde favoritos para personalizar sua experiência no Lyra.</p>

            <ul class="app-sync-list">
                <li class="app-item">
                    <img src="../public/01.png" alt="Google Fit" class="app-logo">
                </li>

                <li class="app-item">
                    <img src="../public/02.png" alt="Apple Health" class="app-logo">
                </li>

                <li class="app-item">
                    <img src="../public/03.png" alt="Samsung Health" class="app-logo">
                </li>
            </ul>

            <div class="action-buttons">
                <a href="./avatar.html"><button class="btn-approve" aria-label="Continuar para o app">
                    Continuar
                    <span class="icon-arrow">→</span>
                </button>
            </div>
        </div>
    </aside>

</body>

</html>

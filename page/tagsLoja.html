                    <ul class="tags-grid" role="list">

                                <img src="../public/tag5.png" alt=Guardião do coração">

                                    <p class="tag-price">1500 <span class="coin-mark" aria-hidden="true"></span></p>

                                </div>

                        </li>

                        <li class="tag-item">
                            <article class="tag-card">
                                <img src="../public/tag4.png" alt="Maratonista">

                                    <p class="tag-price">1500 <span class="coin-mark" aria-hidden="true"></span></p>
                                    <button class="btn-buy-tag" type="button">Comprar</button>
                                </div>
                            </article>

                                    <button class="btn-buy-tag" type="button">Comprar</button>
                                </div>
                            </article>
                        </li>
